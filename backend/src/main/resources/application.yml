server:
  port: 8080

spring:
  application:
    name: chat-server
  datasource:
    url: jdbc:postgresql://postgres:5432/chat_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  websocket:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  # Production deployments MUST override APP_MAIL_FROM with a verified sender.
  # The .local TLD below is only usable against MailHog in dev.
  mail-from: ${APP_MAIL_FROM:noreply@chat.local}
  oembed:
    youtube-url: ${APP_OEMBED_YOUTUBE_URL:https://www.youtube.com/oembed}
  jabber:
    servers:
      -
        label: "A"
        domain: ${APP_JABBER_A_DOMAIN:chat-a.local}
        client-host: ${APP_JABBER_A_CLIENT_HOST:chat-a.local}
        client-port: ${APP_JABBER_A_CLIENT_PORT:5222}
        s2s-host: ${APP_JABBER_A_S2S_HOST:chat-a.local}
        s2s-port: ${APP_JABBER_A_S2S_PORT:5269}
        http-url: ${APP_JABBER_A_HTTP_URL:http://chat-a.local:5280}
        admin-jid: ${APP_JABBER_A_ADMIN_JID:admin@chat-a.local}
        admin-password: ${APP_JABBER_A_ADMIN_PASSWORD:adminpass}
      -
        label: "B"
        domain: ${APP_JABBER_B_DOMAIN:chat-b.local}
        client-host: ${APP_JABBER_B_CLIENT_HOST:chat-b.local}
        client-port: ${APP_JABBER_B_CLIENT_PORT:5222}
        s2s-host: ${APP_JABBER_B_S2S_HOST:chat-b.local}
        s2s-port: ${APP_JABBER_B_S2S_PORT:5269}
        http-url: ${APP_JABBER_B_HTTP_URL:http://chat-b.local:5280}
        admin-jid: ${APP_JABBER_B_ADMIN_JID:admin@chat-b.local}
        admin-password: ${APP_JABBER_B_ADMIN_PASSWORD:adminpass}

logging:
  level:
    root: INFO
    com.hackathon: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN

jwt:
  secret: my-secret-key-that-is-at-least-32-characters-long-for-HS256
  expiration: 86400000

storage:
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
    region: us-east-1
    access-key: ${STORAGE_S3_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_S3_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_S3_BUCKET:chat-attachments}
    path-style-access: true
