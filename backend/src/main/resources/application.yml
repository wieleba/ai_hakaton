server:
  port: 8080

spring:
  application:
    name: chat-server
  datasource:
    url: jdbc:postgresql://postgres:5432/chat_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  websocket:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

logging:
  level:
    root: INFO
    com.hackathon: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN

jwt:
  secret: my-secret-key-that-is-at-least-32-characters-long-for-HS256
  expiration: 86400000

storage:
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
    region: us-east-1
    access-key: ${STORAGE_S3_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_S3_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_S3_BUCKET:chat-attachments}
    path-style-access: true
