server:
  port: 8080

spring:
  application:
    name: chat-server
  datasource:
    url: jdbc:postgresql://postgres:5432/chat_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  websocket:
    enabled: true

logging:
  level:
    root: INFO
    com.hackathon: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN

jwt:
  secret: my-secret-key-that-is-at-least-32-characters-long-for-HS256
  expiration: 86400000
