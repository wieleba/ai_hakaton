plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.12'
    id 'io.spring.dependency-management' version '1.1.7'
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}


group = 'com.hackathon'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-mail'

    // Redis (Lettuce client) for presence session registry + pub/sub
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // Database
    implementation 'org.postgresql:postgresql:42.7.1'
    implementation 'org.flywaydb:flyway-core:9.22.3'

    // JSON/Serialization
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.3'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.3'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.3'

    // Object storage (S3-compatible — MinIO in dev, any S3 endpoint in prod)
    implementation platform('software.amazon.awssdk:bom:2.28.17')
    implementation 'software.amazon.awssdk:s3'

    // Smack — XMPP client library used by the Chat↔Jabber DM bridge. The
    // incoming bridge keeps one long-lived Smack connection per provisioned
    // Chat user so XMPP messages to that user's JID can be converted into
    // Chat DMs. Outgoing uses ejabberd HTTP API (no Smack connection needed).
    implementation 'org.igniterealtime.smack:smack-java8:4.4.8'
    implementation 'org.igniterealtime.smack:smack-tcp:4.4.8'
    implementation 'org.igniterealtime.smack:smack-im:4.4.8'
    implementation 'org.igniterealtime.smack:smack-extensions:4.4.8'
    // Message Carbons (XEP-0280) ship in smack-experimental, not -extensions,
    // because they predate the XEP being finalised. The protocol is stable.
    implementation 'org.igniterealtime.smack:smack-experimental:4.4.8'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Logging
    implementation 'org.springframework.boot:spring-boot-starter-logging'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.testcontainers:testcontainers:1.19.7'
    testImplementation 'org.testcontainers:postgresql:1.19.7'
    testImplementation 'org.testcontainers:junit-jupiter:1.19.7'
    testImplementation 'org.instancio:instancio-junit:5.1.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
}

tasks.named('test') {
    useJUnitPlatform()
}

bootJar {
    archiveBaseName = 'chat-server'
}
