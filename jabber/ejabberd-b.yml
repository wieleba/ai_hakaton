### ejabberd config for server B (chat-b.local).
### Macros at the top; same template as ejabberd-a.yml with different hostnames.

define_macro:
  HOST: "chat-b.local"
  ADMIN: "admin@chat-b.local"

hosts:
  - HOST

loglevel: info

## --- Listeners ---------------------------------------------------------------
listen:
  -
    port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls: false
  -
    port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288
  -
    port: 5280
    ip: "::"
    module: ejabberd_http
    request_handlers:
      /api: mod_http_api
      /admin: ejabberd_web_admin

## --- Auth / passwords --------------------------------------------------------
auth_method: internal
auth_password_format: plain

## --- Server-to-server federation ---------------------------------------------
s2s_use_starttls: false

## --- ACLs --------------------------------------------------------------------
acl:
  admin:
    user: ADMIN
  loopback:
    ip:
      - "127.0.0.0/8"
      - "::1/128"
      - "172.16.0.0/12"
      - "10.0.0.0/8"
      - "192.168.0.0/16"

access_rules:
  local:
    allow: all
  c2s:
    allow: all
  s2s:
    allow: all
  announce:
    allow: admin
  configure:
    allow: admin
  register:
    allow: all
  trusted_network:
    allow: loopback

## --- HTTP API permissions ----------------------------------------------------
api_permissions:
  "console commands":
    from:
      - ejabberd_ctl
    who: all
    what: "*"
  "admin access":
    who:
      access:
        allow:
          - acl: admin
          - acl: loopback
    what:
      - "*"
      - "!stop"
      - "!start"

## --- Shapers -----------------------------------------------------------------
shaper:
  normal:
    rate: 3000
    burst_size: 20000
  fast: 100000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all
  s2s_shaper: fast

max_fsm_queue: 10000

## --- Modules -----------------------------------------------------------------
modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_blocking: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_disco: {}
  mod_http_api: {}
  mod_last: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_register:
    ip_access: all
    access: register
  mod_roster:
    versioning: true
  mod_s2s_dialback: {}
  mod_stream_mgmt: {}
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false
