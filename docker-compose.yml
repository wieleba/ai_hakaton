version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  minio:
    image: minio/minio
    container_name: chat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: chat-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - chat-network

  ## XMPP / Jabber server A — domain chat-a.local
  ## Client port 5222, S2S 5269, HTTP API 5280. Admin: admin@chat-a.local / adminpass.
  ## Pre-registered demo user: alice@chat-a.local / alicepass.
  ejabberd-a:
    image: ejabberd/ecs:24.07
    container_name: chat-ejabberd-a
    hostname: chat-a.local
    environment:
      ## First-time boot registers admin + demo user. Macros in ejabberd-a.yml
      ## define HOST and ADMIN so we don't need EJABBERD_MACRO_* env vars.
      CTL_ON_CREATE: "register admin chat-a.local adminpass ; register alice chat-a.local alicepass"
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
    volumes:
      - ./jabber/ejabberd-a.yml:/home/ejabberd/conf/ejabberd.yml:ro
      - ejabberd_a_data:/opt/ejabberd/database
    networks:
      chat-network:
        aliases:
          - chat-a.local

  ## XMPP / Jabber server B — domain chat-b.local
  ## Client port 5223, S2S 5270, HTTP API 5281. Admin: admin@chat-b.local / adminpass.
  ## Pre-registered demo user: bob@chat-b.local / bobpass.
  ejabberd-b:
    image: ejabberd/ecs:24.07
    container_name: chat-ejabberd-b
    hostname: chat-b.local
    environment:
      CTL_ON_CREATE: "register admin chat-b.local adminpass ; register bob chat-b.local bobpass"
    ports:
      - "5223:5222"
      - "5270:5269"
      - "5281:5280"
    volumes:
      - ./jabber/ejabberd-b.yml:/home/ejabberd/conf/ejabberd.yml:ro
      - ejabberd_b_data:/opt/ejabberd/database
    networks:
      chat-network:
        aliases:
          - chat-b.local

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chat_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: minioadmin
      STORAGE_S3_SECRET_KEY: minioadmin
      STORAGE_S3_BUCKET: chat-attachments
      SPRING_DATA_REDIS_HOST: redis
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      APP_FRONTEND_BASE_URL: "http://localhost:3000"
      APP_MAIL_FROM: "noreply@chat.local"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - chat-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_TARGET: http://backend:8080
    depends_on:
      - backend
    networks:
      - chat-network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts

volumes:
  postgres_data:
  minio_data:
  redis_data:
  ejabberd_a_data:
  ejabberd_b_data:

networks:
  chat-network:
    driver: bridge
